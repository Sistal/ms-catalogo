apiVersion: v1
kind: Service
metadata:
  name: ms-catalogo-svc
  namespace: sistal
  labels:
    app: ms-catalogo
spec:
  type: ClusterIP
  selector:
    app: ms-catalogo
  ports:
  - port: 8080        # Puerto del servicio (interno del clúster)
    targetPort: 8080 # Puerto del contenedor Go
    protocol: TCP