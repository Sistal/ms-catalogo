apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-catalogo
  namespace: sistal
  labels:
    app: ms-catalogo
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-catalogo
  template:
    metadata:
      labels:
        app: ms-catalogo
    spec:
      containers:
      - name: ms-catalogo
        # El pipeline de GitHub Actions (Kustomize) actualizará este tag por el Commit SHA real
        image: southamerica-east1-docker.pkg.dev/construtem/microservicios-construtem/ms-catalogo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 # Puerto estándar de tu app Go
        
        # AQUÍ CONSUME EL CONFIGMAP MANUAL
        envFrom:
        - configMapRef:
            name: ms-catalogo-config
            # optional: true # Descomenta esto si quieres que el pod inicie aunque el configmap no exista
            
        # Buenas prácticas: Límites de recursos
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
